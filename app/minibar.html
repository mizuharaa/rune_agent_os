<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Wisp bar</title>
<style>
  :root {
    --paper: 252, 250, 246;
    --ink: #201a26;
    --ink-soft: rgba(32, 26, 38, 0.55);
    --plum: #6a2e8a;
    --hue-a: #8b5cf6;
    --hue-b: #ec4899;
    --hue-c: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; background: transparent; overflow: hidden;
    font: 14px/1.45 Inter, "Segoe UI", system-ui, sans-serif;
    color: var(--ink); -webkit-font-smoothing: antialiased; user-select: none;
  }

  /* ── island: compact pill that morphs open ── */
  #island {
    position: relative; margin: 8px 10px;
    border-radius: 26px;
    background: rgba(var(--paper), 0.9);
    backdrop-filter: blur(26px) saturate(1.4);
    box-shadow: 0 2px 6px rgba(22, 14, 30, 0.10),
                0 14px 40px rgba(22, 14, 30, 0.20),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
    transition: border-radius .28s cubic-bezier(.2,.8,.3,1.1),
                box-shadow .28s ease, background .28s ease;
  }
  #island::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    padding: 1.5px; pointer-events: none;
    background: linear-gradient(115deg, var(--hue-a), var(--hue-b) 55%, var(--hue-c));
    opacity: .4;
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    transition: opacity .25s ease;
  }
  body[data-state="listening"] #island::before,
  body[data-state="thinking"] #island::before,
  body[data-state="working"] #island::before { opacity: 1; animation: hue 4s linear infinite; }
  @keyframes hue { to { filter: hue-rotate(360deg); } }
  #island[data-open="1"] { border-radius: 20px; }

  /* pill row — the drag handle */
  .pill {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: grab; min-height: 44px;
    -webkit-app-region: drag;
  }
  .pill svg { width: 15px; height: 15px; stroke: var(--plum); fill: none;
              stroke-width: 2; flex: none; }
  #ptext { flex: 1; min-width: 0; color: var(--ink-soft); font-size: 13px;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  body[data-state="thinking"] #ptext, body[data-state="working"] #ptext { color: var(--ink); }

  /* morphing panel (grid-rows trick) */
  #panel { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .3s cubic-bezier(.2,.8,.3,1.05); }
  #island[data-open="1"] #panel { grid-template-rows: 1fr; }
  #panel > .inner { overflow: hidden; }

  .row { display: flex; align-items: center; gap: 6px; padding: 2px 12px 10px;
         -webkit-app-region: no-drag; }
  input#q { flex: 1; min-width: 0; background: rgba(255,255,255,.65);
    border: 1px solid rgba(255,255,255,.9); border-radius: 13px;
    padding: 8px 12px; outline: 0; color: var(--ink); font: inherit; font-size: 13.5px; }
  input#q:focus { border-color: var(--plum); }
  input#q::placeholder { color: var(--ink-soft); }

  button { appearance: none; border: 0; background: transparent; cursor: pointer;
    width: 32px; height: 32px; border-radius: 11px; padding: 0;
    display: grid; place-items: center; color: var(--ink);
    -webkit-app-region: no-drag;
    transition: background .18s ease, transform .18s cubic-bezier(.2,.8,.3,1.2); }
  button:hover { background: rgba(106, 46, 138, 0.10); transform: translateY(-1px); }
  button:active { transform: scale(.94); }
  button:focus-visible { outline: 2px solid var(--plum); outline-offset: 2px; }
  button svg { width: 16px; height: 16px; stroke: currentColor; fill: none;
               stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  #mic.live { color: #fff; background: var(--plum); }
  #stop { display: none; color: #a11f3c; }
  body[data-state="working"] #stop { display: grid; }

  /* answer card */
  #answer { display: none; margin: 0 12px 10px; padding: 11px 13px;
    border-radius: 14px; background: rgba(255,255,255,.72);
    border: 1px solid rgba(106,46,138,.14); font-size: 13px; line-height: 1.5;
    max-height: 300px; overflow-y: auto; white-space: pre-wrap; user-select: text;
    -webkit-app-region: no-drag; animation: rise .25s cubic-bezier(.2,.8,.3,1.1); }
  #answer.show { display: block; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px) scale(.985); } }

  .appr { margin: 0 12px 10px; padding: 10px 13px; border-radius: 14px;
    background: rgba(255,255,255,.78); border: 1px solid rgba(106,46,138,.22);
    font-size: 13px; -webkit-app-region: no-drag; animation: rise .25s ease; }
  .appr .who { color: var(--ink-soft); font-size: 11px; letter-spacing: .03em;
               text-transform: uppercase; margin-bottom: 2px; }
  .appr .what { margin-bottom: 8px; }
  .appr .acts { display: flex; gap: 8px; flex-wrap: wrap; }
  .appr .acts button { width: auto; height: 29px; padding: 0 13px; border-radius: 10px;
    font: 600 12.5px/1 Inter, "Segoe UI", system-ui, sans-serif; }
  .appr .allow { background: var(--plum); color: #fff; }
  .appr .retry { border: 1px solid rgba(32,26,38,.2); }
  .appr .deny { color: #a11f3c; border: 1px solid rgba(161,31,60,.3); }

  #note { display: none; margin: 0 12px 10px; padding: 9px 13px; border-radius: 13px;
    background: rgba(255,255,255,.7); border: 1px solid rgba(106,46,138,.12);
    font-size: 12.5px; -webkit-app-region: no-drag; animation: rise .25s ease; }
  #note.show { display: block; }

  @media (prefers-reduced-motion: reduce) {
    #island, #panel, button { transition: none !important; }
    #island::before { animation: none !important; }
  }
</style>
</head>
<body data-state="idle">
  <div id="island" data-open="0">
    <div class="pill" title="Drag to move — Esc hides">
      <svg viewBox="0 0 24 24"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg>
      <span id="ptext">Ask Wisp — hover to open</span>
    </div>
    <div id="panel"><div class="inner">
      <div class="row">
        <input id="q" placeholder='Ask anything · "run …" hands it to the agents' aria-label="Ask Wisp">
        <button id="mic" aria-label="Talk to Wisp" title="Talk to Wisp">
          <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </button>
        <button id="undo" aria-label="Undo last agent action" title="Ask the agents to undo their last action">
          <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
        </button>
        <button id="stop" aria-label="Stop all running work" title="Stop everything">
          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
        <button id="open" aria-label="Open dashboard" title="Open dashboard">
          <svg viewBox="0 0 24 24"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        </button>
      </div>
      <div id="answer" role="log"></div>
      <div id="approvals"></div>
      <div id="note" role="status"></div>
    </div></div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const island = $("island"), q = $("q"), ptext = $("ptext"),
        answer = $("answer"), note = $("note"), approvalsBox = $("approvals");
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  let state = "idle", running = [], history = [], fromVoice = false;
  const setState = (s) => { state = s; document.body.dataset.state = s; };

  const fit = () => requestAnimationFrame(() =>
    window.wisp && window.wisp.resize(Math.ceil(island.getBoundingClientRect().height) + 16));

  // ── morph open/close ──
  let closeTimer = 0;
  function open() { clearTimeout(closeTimer); island.dataset.open = "1"; fit();
                    setTimeout(fit, 320); }
  function maybeClose() {
    clearTimeout(closeTimer);
    closeTimer = setTimeout(() => {
      const busy = state !== "idle" || answer.classList.contains("show") ||
                   approvalsBox.children.length || note.classList.contains("show") ||
                   document.activeElement === q;
      if (!busy) { island.dataset.open = "0"; setTimeout(fit, 320); }
    }, 700);
  }
  island.addEventListener("mouseenter", open);
  island.addEventListener("mouseleave", maybeClose);
  island.addEventListener("focusin", open);

  function pill(text) { ptext.textContent = text; }

  // ── status like a real assistant, then the actual answer ──
  let statusTimer = 0;
  function stage(texts, i = 0) {
    clearTimeout(statusTimer);
    pill(texts[i]);
    if (i < texts.length - 1)
      statusTimer = setTimeout(() => stage(texts, i + 1), i === 0 ? 750 : 5000);
  }
  function idlePill() {
    clearTimeout(statusTimer);
    pill(running.length
      ? running.length + " running — " + running.map((x) => x.title).join(" · ")
      : "Ask Wisp — hover to open");
  }

  const speak = (t) => { try { speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(t)); } catch (_) {} };

  function toast(html) {
    note.innerHTML = html; note.classList.add("show"); open(); fit();
    clearTimeout(toast.t);
    toast.t = setTimeout(() => { note.classList.remove("show"); fit(); maybeClose(); }, 6000);
    if (Notification.permission === "granted")
      new Notification("Wisp", { body: note.textContent, silent: true });
  }

  async function api(path, body) {
    const r = await fetch(path, body === undefined ? {} : {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body) });
    return { ok: r.ok, status: r.status, data: await r.json().catch(() => ({})) };
  }

  // ── ask: instant chat answer; "run …" hands off to the agents ──
  async function send(text) {
    const t = text.trim();
    if (!t) return;
    const voice = fromVoice; fromVoice = false;
    if (/^(stop|cancel|abort)\b/i.test(t)) return stopAll();
    if (/^undo\b/i.test(t)) return undo();
    if (/^(run|mission)[:\s]/i.test(t)) {
      const goal = t.replace(/^(run|mission)[:\s]+/i, "");
      const r = await api("/api/message", { text: goal, source: "minibar" });
      toast(r.ok ? "<b>Handed to the agents.</b> Track it on the dashboard."
                 : "Engine error " + r.status);
      if (r.ok) q.value = "";
      return;
    }
    setState("thinking");
    stage(["Recalling the brain…", "Thinking about your prompt…",
           "Still thinking — long one…"]);
    const r = await api("/api/chat", { message: t, history });
    clearTimeout(statusTimer); setState("idle"); idlePill();
    if (!r.ok || !r.data.reply)
      return toast("Engine error: " + esc(r.data.error || r.status));
    history.push({ role: "user", content: t },
                 { role: "assistant", content: r.data.reply });
    history = history.slice(-12);
    answer.textContent = r.data.reply;
    answer.classList.add("show"); open(); fit();
    q.value = ""; q.focus();
    if (voice) speak(r.data.reply.split(/(?<=[.!?])\s/)[0].slice(0, 220));
  }

  async function stopAll() {
    const r = await api("/api/stop-all", {});
    const n = (r.data.stopped || []).length;
    toast("<b>Stopped.</b> " + n + " task" + (n === 1 ? "" : "s") + " halted.");
  }
  async function undo() {
    const r = await api("/api/message",
      { text: "Undo the last action you performed and report what was reverted.",
        source: "minibar-undo" });
    toast(r.ok ? "<b>Undo requested.</b>" : "Engine error " + r.status);
  }

  // ── voice: click to talk, click again to finish; replies are spoken ──
  let rec = null, chunks = [];
  $("mic").addEventListener("click", async () => {
    if (rec) { rec.stop(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      rec = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });
      rec.ondataavailable = (e) => chunks.push(e.data);
      rec.onstop = async () => {
        stream.getTracks().forEach((t) => t.stop());
        $("mic").classList.remove("live");
        const blob = new Blob(chunks, { type: "audio/webm" });
        rec = null;
        if (blob.size < 2000) { setState("idle"); idlePill(); return; }
        stage(["Transcribing…"]); setState("thinking");
        const buf = new Uint8Array(await blob.arrayBuffer());
        let bin = "";
        for (let i = 0; i < buf.length; i += 0x8000)
          bin += String.fromCharCode.apply(null, buf.subarray(i, i + 0x8000));
        const r = await api("/api/voice", { audio_b64: btoa(bin) });
        setState("idle"); idlePill();
        if (r.status === 501) return toast("<b>Whisper missing.</b> pip install faster-whisper");
        if (!r.ok || !r.data.text) return toast("Didn't catch that.");
        q.value = r.data.text; fromVoice = true;
        send(r.data.text);
      };
      rec.start();
      $("mic").classList.add("live");
      setState("listening"); pill("Listening — click the mic to finish"); open();
    } catch (_) { toast("<b>Microphone unavailable.</b>"); }
  });

  q.addEventListener("keydown", (e) => {
    if (e.key === "Enter") send(q.value);
    if (e.key === "Escape" && answer.classList.contains("show")) {
      answer.classList.remove("show"); fit(); e.stopPropagation();
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") window.wisp && window.wisp.hide();
  });
  $("stop").addEventListener("click", stopAll);
  $("undo").addEventListener("click", undo);
  $("open").addEventListener("click", () => window.wisp && window.wisp.openMain());

  // ── approval queue ──
  let seenApprovals = new Set();
  function renderApprovals(list) {
    const ids = new Set(list.map((a) => a.request_id));
    for (const a of list)
      if (!seenApprovals.has(a.request_id) && Notification.permission === "granted")
        new Notification("Wisp — approval needed", { body: a.summary });
    seenApprovals = ids;
    approvalsBox.innerHTML = list.map((a) => `
      <div class="appr" data-rid="${esc(a.request_id)}">
        <div class="who">${esc(a.mission)}${a.kind === "credential" ? " — credentials" : ""}</div>
        <div class="what">${esc(a.summary)}</div>
        <div class="acts">
          ${a.can_authorize ? `<button class="allow" data-act="allow">Allow &amp; resume</button>` : ""}
          <button class="retry" data-act="retry">Retry after fixing</button>
          ${a.can_authorize ? `<button class="deny" data-act="deny">Deny &amp; skip</button>` : ""}
        </div>
      </div>`).join("");
    if (list.length) open();
    approvalsBox.querySelectorAll("button").forEach((b) =>
      b.addEventListener("click", async () => {
        const a = list.find((x) => x.request_id === b.closest(".appr").dataset.rid);
        if (!a) return;
        b.disabled = true;
        const r = await api("/api/ceo-action",
          { cid: a.cid, role: a.role, action: b.dataset.act, request_id: a.request_id });
        toast(r.ok ? "<b>" + b.textContent + ".</b>" : "Rejected: " + esc(r.data.error || r.status));
        poll();
      }));
    fit();
  }

  // ── live activity + completion notifications ──
  let wasRunning = new Map();
  async function poll() {
    try {
      const { data } = await api("/api/activity");
      renderApprovals(data.approvals || []);
      running = data.running || [];
      if (running.length && state === "idle") setState("working");
      if (!running.length && state === "working") setState("idle");
      if (state === "idle" || state === "working") idlePill();
      for (const item of data.recent || []) {
        if (wasRunning.has(item.id)) {
          wasRunning.delete(item.id);
          const good = /done|accept/.test(item.status);
          toast("<b>" + (good ? "Finished" : "Ended (" + item.status + ")") + ":</b> " +
                esc(item.title));
        }
      }
      running.forEach((x) => wasRunning.set(x.id, 1));
    } catch (_) { /* engine offline */ }
  }
  setInterval(poll, 4000); poll();

  async function brief() {
    try {
      const { data } = await api("/api/briefing");
      const id = data && data.batch && data.batch.id;
      if (id && localStorage.getItem("wisp-brief") !== id) {
        localStorage.setItem("wisp-brief", id);
        toast("<b>Daily brief is ready.</b> Open the dashboard to read it.");
      }
    } catch (_) {}
  }
  setInterval(brief, 10 * 60 * 1000); brief();

  if (Notification.permission === "default") Notification.requestPermission();
  idlePill(); fit();
</script>
</body>
</html>
